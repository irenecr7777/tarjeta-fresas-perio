<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjeta Fresas Perio Set</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f0f4f8;
    }

    .card-container {
      width: 340px;
      height: 480px;
      perspective: 1200px;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1);
      cursor: pointer;
    }

    .card-container:hover .card {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 18px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      overflow: hidden;
    }

    .card-front {
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card-front img {
      width: 92%;
      height: 92%;
      object-fit: contain;
    }

    .card-back {
      background: #fdebd0;
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 30px 28px;
      box-sizing: border-box;
    }

    .card-back h1 {
      font-family: 'Times New Roman', Times, serif;
      font-size: 20px;
      font-weight: bold;
      color: #7d4e0f;
      text-align: center;
      margin: 0 0 20px 0;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 2px solid #7d4e0f;
      padding-bottom: 10px;
      width: 100%;
    }

    .card-back p {
      font-family: 'Times New Roman', Times, serif;
      font-size: 15px;
      color: #7d4e0f;
      text-align: center;
      margin: 0;
      line-height: 1.8;
    }
  </style>
</head>
